name: Auto Create PR and Merge to Main

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, ready_for_review]
    branches:
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-create PR and merge to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine branch name based on event type
          if [ "${{ github.event_name }}" = "push" ]; then
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          else
            BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          fi

          echo "=== Auto PR & Merge ==="
          echo "Branch: $BRANCH_NAME"
          echo "Event:  ${{ github.event_name }}"

          # Check for existing open PR
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --base main --state open --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -z "$PR_NUMBER" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "No open PR found. Creating one..."
              PR_URL=$(gh pr create \
                --base main \
                --head "$BRANCH_NAME" \
                --title "Auto-merge: $BRANCH_NAME" \
                --body "Automatically created and merged by GitHub Actions.")
              PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
              echo "Created PR #$PR_NUMBER"
            else
              echo "No open PR found for pull_request event. Nothing to do."
              exit 0
            fi
          else
            echo "Found existing PR #$PR_NUMBER"
          fi

          # Check if PR is a draft – skip merge until it becomes ready
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --json isDraft --jq '.isDraft') || {
            echo "::error::Failed to fetch PR #$PR_NUMBER details."
            exit 1
          }

          if [ "$IS_DRAFT" = "true" ]; then
            echo "PR #$PR_NUMBER is a draft – skipping merge."
            echo "It will be auto-merged when marked as ready for review."
            exit 0
          fi

          # Merge the PR into main
          echo "Merging PR #$PR_NUMBER into main..."
          gh pr merge "$PR_NUMBER" --merge --delete-branch
          echo "✅ PR #$PR_NUMBER merged into main successfully!"
