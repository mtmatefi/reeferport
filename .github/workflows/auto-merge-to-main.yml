name: Auto Merge to Main

on:
  push:
    branches-ignore:
      - main

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge branch into main
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Merging branch '$BRANCH_NAME' into main..."

          git checkout main

          if git merge origin/"$BRANCH_NAME" --no-edit; then
            git push origin main
            echo "Successfully merged '$BRANCH_NAME' into main."
          else
            git merge --abort
            echo "::error::Merge conflict detected when merging '$BRANCH_NAME' into main. Please resolve manually."
            exit 1
          fi
